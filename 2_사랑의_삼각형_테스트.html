<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>스턴버그 사랑의 삼각형 검사</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nanum Gothic',sans-serif;background:#FFF5F9;min-height:100vh;padding:32px 20px 60px}
.screen{display:none;max-width:680px;margin:0 auto}
.screen.active{display:block}

.intro-card{background:white;border-radius:24px;padding:44px 36px;text-align:center;box-shadow:0 4px 24px rgba(236,72,153,.1);border:1px solid #FBCFE8}
.intro-emoji{font-size:52px;margin-bottom:14px}
h1{font-size:28px;font-weight:800;color:#1E1B2E;margin-bottom:8px;font-family:'Nanum Myeongjo',serif}
.intro-sub{font-size:14px;color:#4B4869;line-height:1.7;margin-bottom:24px}
.factor-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:28px}
.factor-pill{padding:10px 16px;border-radius:14px;text-align:center;flex:1;min-width:120px}
.factor-pill .fp-icon{font-size:22px;margin-bottom:4px}
.factor-pill .fp-name{font-size:13px;font-weight:800}
.factor-pill .fp-desc{font-size:10px;margin-top:2px;opacity:.8}
.fp-passion{background:#FFE8E8;color:#991B1B}
.fp-intimacy{background:#E0F7FA;color:#065F46}
.fp-commitment{background:#EDE9FE;color:#4C1D95}
.info-pills{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:28px}
.pill{background:#FCE7F3;color:#9D174D;font-size:12px;font-weight:700;padding:6px 14px;border-radius:99px}
.btn-start{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#EC4899,#8B5CF6);color:white;border:none;border-radius:16px;padding:16px 40px;font-size:17px;font-weight:800;font-family:'Nanum Gothic',sans-serif;cursor:pointer;transition:.15s;box-shadow:0 4px 16px rgba(236,72,153,.35)}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(236,72,153,.4)}

.prog-wrap{margin-bottom:20px}
.prog-info{display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:#4B4869;margin-bottom:8px}
.prog-track{height:8px;background:#FBCFE8;border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#EC4899,#8B5CF6);border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}

.page-card{background:white;border-radius:20px;padding:24px 24px 20px;box-shadow:0 4px 20px rgba(0,0,0,.06);border:1px solid #FBCFE8;animation:slideUp .35s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.page-label{display:inline-flex;align-items:center;gap:7px;padding:5px 14px;border-radius:99px;font-size:12px;font-weight:800;margin-bottom:16px}
.pl-passion{background:#FFE8E8;color:#991B1B}
.pl-intimacy{background:#E0F7FA;color:#065F46}
.pl-commitment{background:#EDE9FE;color:#4C1D95}

.scale-legend{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #FFF0F6}
.sl-item{font-size:10px;color:#4B4869;font-weight:700;display:flex;align-items:center;gap:4px}
.sl-num{width:20px;height:20px;border-radius:5px;background:#FCE7F3;color:#DB2777;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center}

.scale-header{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.sh-label{font-size:10px;font-weight:700;color:#94A3B8;text-align:center;width:32px;flex-shrink:0}

.q-row{display:flex;align-items:center;gap:8px;padding:11px 0;border-bottom:1px solid #FFF0F6;transition:.2s}
.q-row:last-of-type{border-bottom:none}
.q-num{width:26px;height:26px;border-radius:8px;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s}
.q-num-passion{background:#FFE8E8;color:#991B1B}
.q-num-intimacy{background:#E0F7FA;color:#065F46}
.q-num-commitment{background:#EDE9FE;color:#4C1D95}
.q-text{flex:1;font-size:13px;color:#1E1B2E;line-height:1.5;word-break:keep-all;padding-right:6px}
.q-btns{display:flex;gap:4px;flex-shrink:0}
.q-btn{width:32px;height:36px;border-radius:8px;border:2px solid #F3E8FF;background:white;cursor:pointer;font-family:'Nanum Gothic',sans-serif;font-size:12px;font-weight:800;color:#4B4869;transition:.12s;display:flex;align-items:center;justify-content:center}
.q-btn:hover{transform:translateY(-1px)}
.q-btn.sel-passion{border-color:#FF6B6B;background:#FF6B6B;color:white}
.q-btn.sel-intimacy{border-color:#06B6D4;background:#06B6D4;color:white}
.q-btn.sel-commitment{border-color:#8B5CF6;background:#8B5CF6;color:white}
.q-btn:not(.sel-passion):not(.sel-intimacy):not(.sel-commitment):hover{border-color:#EC4899;background:#FCE7F3;color:#9D174D}
.q-row.unanswered .q-num{background:#FFE8E8 !important;color:#DC2626 !important}
.q-row.unanswered{background:#FFF9F9;border-radius:10px}

.btn-next{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:20px;background:linear-gradient(135deg,#EC4899,#8B5CF6);color:white;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:800;font-family:'Nanum Gothic',sans-serif;cursor:pointer;transition:.15s;box-shadow:0 3px 12px rgba(236,72,153,.3)}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(236,72,153,.35)}

/* result */
.result-card{background:white;border-radius:24px;padding:36px 28px;box-shadow:0 4px 24px rgba(0,0,0,.08);border:1px solid #FBCFE8;animation:slideUp .4s ease}
.result-love-badge{display:inline-block;font-size:14px;font-weight:800;padding:6px 18px;border-radius:99px;margin-bottom:12px}
.result-love-name{font-size:30px;font-weight:800;font-family:'Nanum Myeongjo',serif;margin-bottom:4px;color:#1E1B2E}
.result-love-eng{font-size:13px;color:#4B4869;margin-bottom:22px;font-style:italic}

.bars-section{margin-bottom:20px}
.bar-row{margin-bottom:14px}
.bar-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.bar-name{font-size:13px;font-weight:800}
.bar-score{font-size:13px;font-weight:800}
.bar-track{height:12px;background:#F3F4F6;border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width 1s cubic-bezier(.4,0,.2,1)}

.triangle-section{display:flex;justify-content:center;margin:16px 0 20px}

.result-type-desc{border-radius:14px;padding:16px 18px;font-size:13px;line-height:1.8;margin-bottom:12px}
.result-tips-title{font-size:12px;font-weight:800;color:#DB2777;margin-bottom:8px}
.result-tip{font-size:12px;color:#4B4869;line-height:1.7;border-left:3px solid #EC4899;padding:9px 13px;border-radius:0 10px 10px 0;margin-bottom:7px;background:#FFF5F9}

.btn-retry{display:flex;align-items:center;gap:8px;margin:20px auto 0;background:#FCE7F3;color:#9D174D;border:2px solid #EC4899;border-radius:14px;padding:13px 36px;font-size:15px;font-weight:800;font-family:'Nanum Gothic',sans-serif;cursor:pointer;transition:.15s}
.btn-retry:hover{background:linear-gradient(135deg,#EC4899,#8B5CF6);color:white;border-color:transparent}
</style>
</head>
<body>

<!-- Intro -->
<div class="screen active" id="sIntro">
  <div class="intro-card">
    <div class="intro-emoji">💘</div>
    <h1>스턴버그의 사랑 유형 검사</h1>
    <p class="intro-sub">내 관계 안에서 열정, 친밀감, 헌신이<br>얼마나 있는지 알아봐요.</p>
    <div class="factor-row">
      <div class="factor-pill fp-passion">
        <div class="fp-icon">🔥</div>
        <div class="fp-name">열정</div>
        <div class="fp-desc">설렘 · 끌림 · 흥분</div>
      </div>
      <div class="factor-pill fp-intimacy">
        <div class="fp-icon">💬</div>
        <div class="fp-name">친밀감</div>
        <div class="fp-desc">유대 · 신뢰 · 공유</div>
      </div>
      <div class="factor-pill fp-commitment">
        <div class="fp-icon">🤝</div>
        <div class="fp-name">헌신</div>
        <div class="fp-desc">결심 · 유지 · 의지</div>
      </div>
    </div>
    <p style="font-size:12px;color:#DB2777;font-weight:700;margin-bottom:14px">
      ✏️ 현재 또는 최근의 가까운 관계를 떠올리며 답해 주세요.
    </p>
    <div class="info-pills">
      <span class="pill">📋 21문항</span>
      <span class="pill">⏱️ 약 4분</span>
      <span class="pill">📊 3개 척도</span>
    </div>
    <button class="btn-start" onclick="startQuiz()">시작하기 →</button>
  </div>
</div>

<!-- Quiz -->
<div class="screen" id="sQuiz">
  <div class="prog-wrap">
    <div class="prog-info">
      <span id="pLabel">1 / 3 파트</span>
      <span id="pPct">0%</span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="pFill" style="width:0%"></div></div>
  </div>
  <div id="pageCard"></div>
</div>

<!-- Result -->
<div class="screen" id="sResult">
  <div class="result-card">
    <div id="rBadge" class="result-love-badge"></div>
    <div id="rName" class="result-love-name"></div>
    <div id="rEng" class="result-love-eng"></div>

    <div class="bars-section" id="rBars"></div>
    <div class="triangle-section"><canvas id="triCanvas" width="280" height="260"></canvas></div>
    <div id="rDesc" class="result-type-desc"></div>
    <div class="result-tips-title">💡 이런 점을 생각해봐요</div>
    <div id="rTips"></div>
    <button class="btn-retry" onclick="retry()">🔄 다시 하기</button>
  </div>
</div>

<script>
// Sternberg's Triangular Love Scale — 한국어판 (7문항 × 3요소 = 21문항)
// 척도: 1(전혀 아니다) ~ 7(매우 그렇다)
// 각 요소 점수 = 문항 합산 / 7 → 1~7점 평균
const QS = [
  // ── 열정 (Passion) ───────────────────────────────
  {n:1,  text:"나는 이 사람을 보거나 생각하면 설레고 두근거린다.", axis:"passion"},
  {n:2,  text:"이 사람과 함께 있으면 로맨틱한 감정이 느껴진다.", axis:"passion"},
  {n:3,  text:"나는 이 사람에게 강하게 끌린다.", axis:"passion"},
  {n:4,  text:"이 사람에 대한 생각이 자꾸 머릿속에 떠오른다.", axis:"passion"},
  {n:5,  text:"이 사람과의 신체적·감각적 교감이 내게 중요하다.", axis:"passion"},
  {n:6,  text:"나는 이 사람과 함께 있는 시간이 흥분되고 특별하게 느껴진다.", axis:"passion"},
  {n:7,  text:"이 사람을 향한 감정은 마치 불꽃처럼 강렬하다.", axis:"passion"},
  // ── 친밀감 (Intimacy) ────────────────────────────
  {n:8,  text:"나는 이 사람과 깊이 연결되어 있다는 느낌이 든다.", axis:"intimacy"},
  {n:9,  text:"나는 이 사람에게 속마음을 털어놓을 수 있다.", axis:"intimacy"},
  {n:10, text:"이 사람은 나를 진심으로 이해해 준다고 느낀다.", axis:"intimacy"},
  {n:11, text:"나는 이 사람이 잘 되기를 진심으로 바란다.", axis:"intimacy"},
  {n:12, text:"나는 힘들 때 이 사람에게 기대고 싶다.", axis:"intimacy"},
  {n:13, text:"이 사람과 나는 서로 따뜻하고 편안한 관계이다.", axis:"intimacy"},
  {n:14, text:"나는 이 사람과 함께할 때 있는 그대로의 나를 보여줄 수 있다.", axis:"intimacy"},
  // ── 헌신 (Commitment) ────────────────────────────
  {n:15, text:"나는 이 사람과의 관계를 계속 유지하기로 결심했다.", axis:"commitment"},
  {n:16, text:"나는 이 사람과의 관계가 힘들어도 포기하지 않을 것이다.", axis:"commitment"},
  {n:17, text:"나는 이 사람과의 관계에 장기적으로 전념하고 있다.", axis:"commitment"},
  {n:18, text:"이 관계를 지키기 위해 기꺼이 노력할 수 있다.", axis:"commitment"},
  {n:19, text:"나는 이 사람을 내 삶의 중요한 사람으로 여긴다.", axis:"commitment"},
  {n:20, text:"이 관계는 내게 매우 소중하고 지켜야 할 것이다.", axis:"commitment"},
  {n:21, text:"나는 앞으로도 이 사람과 함께하고 싶다.", axis:"commitment"},
];

const PAGES = [
  {axis:"passion",    label:"열정",  icon:"🔥", cls:"passion",    qs: QS.slice(0,7)},
  {axis:"intimacy",   label:"친밀감", icon:"💬", cls:"intimacy",   qs: QS.slice(7,14)},
  {axis:"commitment", label:"헌신",  icon:"🤝", cls:"commitment", qs: QS.slice(14,21)},
];
const LABELS7 = ["전혀\n아니다","아니다","약간\n아니다","보통","약간\n그렇다","그렇다","매우\n그렇다"];
let answers = {}, curPage = 0;

// love types: threshold 4.5 (mid of 1-7 scale)
const LOVE_TYPES = [
  {
    passion:true, intimacy:true, commitment:true,
    name:"완전한 사랑", eng:"Consummate Love", icon:"💍",
    bg:"#FDF2FF", border:"#C084FC", textColor:"#6B21A8",
    desc:"열정·친밀감·헌신이 모두 갖춰진 스턴버그가 말하는 이상적인 사랑이에요. 설렘도, 깊은 유대도, 함께하려는 결심도 있는 관계예요. 이 상태를 유지하는 것이 달성하는 것만큼 어렵다는 걸 기억해요.",
    tips:["세 요소가 모두 높아도 서로 소통하며 관계를 가꾸는 노력이 필요해요.","현재의 이 균형이 얼마나 소중한지 잊지 마세요."]
  },
  {

    desc:"강렬한 설렘과 깊은 유대가 있지만, 아직 '끝까지 함께하겠다'는 결심이 충분하지 않아요. 연애 초반이나 아직 미래를 확신하지 못하는 관계에서 자주 나타나요.",
    tips:["설렘이 식기 전에 이 관계를 어떻게 발전시킬지 생각해봐요.","헌신이 낮다면 나는 이 관계에서 무엇을 원하는지 솔직하게 돌아봐요."]
  },
  {
    passion:true, intimacy:false, commitment:true,
    name:"얼빠진 사랑", eng:"Fatuous Love", icon:"🎠",

    desc:"강한 끌림과 헌신은 있지만 진정한 친밀감이 부족한 상태예요. 빠르게 사귀거나 결혼한 경우에 나타나기도 해요. 설렘과 결심은 있지만 서로를 깊이 아는 시간이 부족할 수 있어요.",

    desc:"설렘은 줄었지만 깊은 신뢰와 유대, 그리고 함께하려는 의지가 있는 성숙한 사랑이에요. 오래된 커플이나 장기 부부에서 자주 나타나요. 안정적이고 지속 가능한 사랑의 형태예요.",
    tips:["열정이 낮다고 나쁜 관계가 아니에요. 신뢰와 헌신이 사랑의 기반이에요.","가끔 둘만의 새로운 경험을 만들어 설렘을 되살려봐요."]
  },
  {

    tips:["상대방을 더 알아가는 시간을 가져보세요.","이 설렘이 진짜 관계로 발전할 수 있는지 생각해봐요."]
  },
  {
    passion:false, intimacy:true, commitment:false,
    name:"좋아함", eng:"Liking", icon:"😊",

    tips:["이 관계가 우정인지 사랑인지 나 자신의 마음을 살펴봐요.","편안함 속에서 새로운 감정이 자랄 수 있어요."]
  },
  {
    passion:false, intimacy:false, commitment:true,

  },
  {
    passion:false, intimacy:false, commitment:false,
    name:"사랑 없음", eng:"Nonlove", icon:"🤍",
    bg:"#F9FAFB", border:"#E5E7EB", textColor:"#6B7280",
    desc:"세 요소 모두 낮은 상태예요. 지금 이 관계에 대한 감정이 식었거나, 혹은 아직 충분히 형성되지 않은 상태일 수 있어요. 현재 관계를 솔직하게 돌아볼 시간이 필요해요.",
    tips:["지금 이 관계를 어떻게 바라보는지 솔직하게 써봐요.","관계의 방향에 대해 상대방과 대화가 필요할 수 있어요."]
  },
];

function startQuiz() {
  answers = {}; curPage = 0;
  show('sQuiz'); renderPage();
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
}

function renderPage() {
  const pg = PAGES[curPage];
  const pct = Math.round(curPage / PAGES.length * 100);
  document.getElementById('pLabel').textContent = `파트 ${curPage+1} / ${PAGES.length} — ${pg.icon} ${pg.label}`;
  document.getElementById('pPct').textContent = pct + '%';
  document.getElementById('pFill').style.width = pct + '%';

  const isLast = curPage === PAGES.length - 1;
  let html = `<div class="page-card">
    <div class="page-label pl-${pg.cls}">${pg.icon} ${pg.label} 파트</div>
    <div class="scale-legend">
      ${[1,2,3,4,5,6,7].map((v,i) => `<div class="sl-item"><div class="sl-num">${v}</div>${LABELS7[i].replace('\n','')}</div>`).join('')}
    </div>
    <div class="scale-header">
      <div style="flex:1;min-width:0"></div>
      ${[1,2,3,4,5,6,7].map(v => `<div class="sh-label">${v}</div>`).join('')}
    </div>`;

  pg.qs.forEach(q => {
    const ans = answers[q.n];
    html += `<div class="q-row" id="qrow-${q.n}">
      <div class="q-num q-num-${pg.cls}">${q.n}</div>
      <div class="q-text">${q.text}</div>
      <div class="q-btns">
        ${[1,2,3,4,5,6,7].map(v =>
          `<button class="q-btn${ans===v ? ` sel-${pg.cls}` : ''}" onclick="setAnswer(${q.n},${v},'${pg.cls}',this)">${v}</button>`
        ).join('')}
      </div>
    </div>`;
  });

  html += `<button class="btn-next" onclick="nextPage()">
    ${isLast ? '결과 보기 →' : `다음: ${PAGES[curPage+1]?.icon} ${PAGES[curPage+1]?.label} →`}
  </button></div>`;

  const wrap = document.getElementById('pageCard');
  wrap.innerHTML = html;
  const card = wrap.querySelector('.page-card');
  card.style.animation = 'none'; card.offsetHeight; card.style.animation = 'slideUp .35s ease';
}

function setAnswer(qn, v, cls, btn) {
  answers[qn] = v;
  const row = document.getElementById(`qrow-${qn}`);
  row.classList.remove('unanswered');
  row.querySelectorAll('.q-btn').forEach(b => {
    b.className = 'q-btn';
  });
  btn.classList.add(`sel-${cls}`);
}

function nextPage() {
  const pg = PAGES[curPage];
  const unanswered = pg.qs.filter(q => !answers[q.n]);
  if (unanswered.length) {
    unanswered.forEach(q => document.getElementById(`qrow-${q.n}`).classList.add('unanswered'));
    document.getElementById('pageCard').scrollIntoView({behavior:'smooth'});
    return;
  }
  curPage++;
  if (curPage < PAGES.length) renderPage();
  else calcResult();
}

function calcResult() {
  const passionItems     = QS.filter(q => q.axis === 'passion');
  const intimacyItems    = QS.filter(q => q.axis === 'intimacy');
  const commitmentItems  = QS.filter(q => q.axis === 'commitment');

  const pSum = passionItems.reduce((s,q)    => s + (answers[q.n]||1), 0);
  const iSum = intimacyItems.reduce((s,q)   => s + (answers[q.n]||1), 0);
  const cSum = commitmentItems.reduce((s,q) => s + (answers[q.n]||1), 0);

  // 평균 점수 (1~7)
  const pAvg = pSum / 7;
  const iAvg = iSum / 7;
  const cAvg = cSum / 7;

  // 4.5 기준으로 High/Low 분류 (7점 척도 중간)
  const THR = 4.0;
  const pH = pAvg >= THR, iH = iAvg >= THR, cH = cAvg >= THR;

  const type = LOVE_TYPES.find(t =>
    t.passion === pH && t.intimacy === iH && t.commitment === cH
  ) || LOVE_TYPES[LOVE_TYPES.length - 1];

  // 퍼센트로 변환 (1~7 → 0~100%)
  const pPct = Math.round((pAvg - 1) / 6 * 100);
  const iPct = Math.round((iAvg - 1) / 6 * 100);
  const cPct = Math.round((cAvg - 1) / 6 * 100);

  // render badge
  document.getElementById('rBadge').textContent = `${type.icon} ${type.name}`;
  document.getElementById('rBadge').style.cssText =
    `background:${type.bg};color:${type.textColor};border:1px solid ${type.border};font-size:14px;font-weight:800;padding:6px 18px;border-radius:99px;margin-bottom:12px;display:inline-block`;
  document.getElementById('rName').textContent = `${type.icon} ${type.name}`;
  document.getElementById('rEng').textContent = type.eng;

  // bars
  const bars = [
    {label:'🔥 열정', pct:pPct, avg:pAvg, color:'#FF6B6B', bg:'#FFE8E8'},
    {label:'💬 친밀감', pct:iPct, avg:iAvg, color:'#06B6D4', bg:'#E0F7FA'},
    {label:'🤝 헌신',  pct:cPct, avg:cAvg, color:'#8B5CF6', bg:'#EDE9FE'},
  ];
  document.getElementById('rBars').innerHTML = bars.map(b => `
    <div class="bar-row">
      <div class="bar-label">
        <span class="bar-name" style="color:${b.color}">${b.label}</span>
        <span class="bar-score" style="color:${b.color}">${b.avg.toFixed(1)} / 7</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width:0%;background:${b.color}" data-w="${b.pct}"></div>
      </div>
    </div>
  `).join('');

  // animate bars
  setTimeout(() => {
    document.querySelectorAll('.bar-fill').forEach(el => {
      el.style.width = el.dataset.w + '%';
    });
  }, 100);

  // triangle SVG
  drawTriangle(pH, iH, cH, pPct, iPct, cPct, type.textColor);

  document.getElementById('rDesc').textContent = type.desc;
  document.getElementById('rDesc').style.cssText =
    `border-radius:14px;padding:16px 18px;font-size:13px;line-height:1.8;margin-bottom:12px;background:${type.bg};border:1px solid ${type.border};color:#1E1B2E`;
  document.getElementById('rTips').innerHTML = type.tips.map(t =>
    `<div class="result-tip" style="border-left-color:${type.textColor};background:${type.bg}">${t}</div>`).join('');

  show('sResult');
}

function drawTriangle(pH, iH, cH, pPct, iPct, cPct, accentColor) {
  const c = document.getElementById('triCanvas');
  const ctx = c.getContext('2d');
  const W=280, H=260;
  c.width=W; c.height=H;
  ctx.clearRect(0,0,W,H);

  // vertices: I=top, P=bottom-left, C=bottom-right
  const I  = [140, 22];
  const P  = [18,  228];
  const C  = [262, 228];
  const mid = [140, 159];

  // outline triangle
  ctx.beginPath(); ctx.moveTo(...I); ctx.lineTo(...P); ctx.lineTo(...C); ctx.closePath();
  ctx.strokeStyle = '#E5E3F0'; ctx.lineWidth = 1.5; ctx.setLineDash([5,4]); ctx.stroke();
  ctx.setLineDash([]);

  // filled region based on active vertices
  let pts = [];
  if (pH && iH && cH) { pts = [...I,...P,...C]; }
  else if (iH && cH)  { pts = [...mid,...I,...C]; }
  else if (pH && iH)  { pts = [...mid,...P,...I]; }
  else if (pH && cH)  { pts = [...mid,...P,...C]; }
  else if (iH)        { pts = [I[0],I[1], I[0]-12,mid[1], I[0]+12,mid[1]]; }
  else if (pH)        { pts = [P[0],P[1], P[0]+14,P[1]-10, P[0]+6,P[1]-22]; }
  else if (cH)        { pts = [C[0],C[1], C[0]-14,C[1]-10, C[0]-6,C[1]-22]; }

  if (pts.length >= 6) {
    ctx.beginPath();
    ctx.moveTo(pts[0], pts[1]);
    for (let i=2; i<pts.length; i+=2) ctx.lineTo(pts[i], pts[i+1]);
    ctx.closePath();
    ctx.fillStyle = accentColor + '30';
    ctx.fill();
    ctx.strokeStyle = accentColor;
    ctx.lineWidth = 2.5;
    ctx.stroke();
  }

  // vertex dots
  [[I, iH, '#06B6D4'], [P, pH, '#FF6B6B'], [C, cH, '#8B5CF6']].forEach(([v, active, col]) => {
    ctx.beginPath(); ctx.arc(v[0], v[1], active ? 9 : 7, 0, Math.PI*2);
    if (active) { ctx.fillStyle = col; ctx.fill(); }
    else { ctx.strokeStyle = '#CBD5E1'; ctx.lineWidth = 1.5; ctx.stroke(); ctx.fillStyle='white'; ctx.fill(); }
  });

  // labels
  const labStyle = (active, col) => { ctx.fillStyle = active ? col : '#94A3B8'; ctx.font = `${active?'700':'400'} 12px system-ui`; };
  ctx.textAlign = 'center';
  labStyle(iH, '#06B6D4'); ctx.fillText('친밀감', I[0], I[1]-14);
  labStyle(pH, '#FF6B6B'); ctx.fillText('열정', P[0], P[1]+18);
  labStyle(cH, '#8B5CF6'); ctx.fillText('헌신', C[0], C[1]+18);
}

function retry() { show('sIntro'); }
</script>
